{% extends 'base.html' %}
{% block title %}Post News{% endblock %}
{% block content %}
<div style="max-width:680px;">
  <div style="margin-bottom:1.5rem;">
    <a href="{{ url_for('dashboard') }}" style="color:var(--muted);text-decoration:none;font-size:.875rem;"><i class="fas fa-arrow-left me-2"></i>Back</a>
    <h4 style="font-family:'Space Grotesk',sans-serif;font-weight:800;margin-top:.75rem;margin-bottom:.25rem;">Write News / Announcement</h4>
    <p style="color:var(--muted);font-size:.875rem;">Share updates, achievements, or announcements with the community.</p>
  </div>
  <div class="card">
    <div class="card-body" style="padding:2rem;">
      <form method="POST">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Title <span style="color:red">*</span></label>
            <input type="text" name="title" class="form-control" required placeholder="e.g. Alumni Wins National Award">
          </div>
          <div class="col-md-4">
            <label class="form-label">Category</label>
            <select name="category" class="form-select">
              {% for c in ['General','Achievement','Announcement','Placements','Events','Research','Industry'] %}
              <option>{{ c }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Content <span style="color:red">*</span></label>
            <textarea name="content" class="form-control" rows="8" required placeholder="Write the full news article here..."></textarea>
          </div>
        </div>
        <div style="margin-top:1.5rem;display:flex;gap:.75rem;">
          <button type="submit" style="background:#7c3aed;border:none;" class="btn text-white px-4"><i class="fas fa-paper-plane me-2"></i>Publish</button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-light">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
